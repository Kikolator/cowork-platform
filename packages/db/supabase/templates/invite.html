<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>You've Been Invited</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;">
  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <!-- Container -->
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:20px;">
              <img src="https://rogueops.app/logo.png" width="140" height="40" alt="RogueOps" style="display:block;border:0;" />
            </td>
          </tr>
          <!-- Card -->
          <tr>
            <td style="background-color:#ffffff;border-radius:8px;padding:32px 24px;border:1px solid #e4e4e7;">
              <h1 style="font-size:22px;font-weight:600;color:#18181b;line-height:1.3;margin:0 0 8px;">You've been invited</h1>
              <p style="font-size:15px;line-height:1.6;color:#3f3f46;margin:0 0 16px;">
                You've been invited to join as a member. Click below to accept and set up your account.
              </p>
              <!-- CTA button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin-top:8px;">
                <tr>
                  <td style="border-radius:6px;background-color:#18181b;">
                    <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=invite"
                       target="_blank"
                       style="display:inline-block;padding:12px 28px;font-size:15px;font-weight:500;color:#ffffff;text-decoration:none;border-radius:6px;">
                      Accept Invite
                    </a>
                  </td>
                </tr>
              </table>
              <p style="font-size:13px;line-height:1.5;color:#71717a;margin:16px 0 0;">
                If you weren't expecting this invite, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding-top:24px;border-top:1px solid #e4e4e7;margin-top:24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <p style="font-size:13px;color:#71717a;margin:0 0 4px;">
                      Sent by <a href="https://rogueops.app" style="color:#18181b;text-decoration:underline;">RogueOps</a>
                    </p>
                    <p style="font-size:12px;color:#a1a1aa;margin:0;">
                      &copy; {{ .Now.Year }} RogueOps. All rights reserved.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
