# Deploy to staging — pushes migrations on every push to dev
name: Deploy Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

# Never cancel in-flight migrations — wait for previous run to finish
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  migrate:
    name: Push Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref "$STAGING_REF"
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}

      - name: Push migrations
        run: supabase db push
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

      - name: Summary
        if: always()
        run: echo "### Migrate ${{ job.status == 'success' && '✅' || '❌' }}" >> "$GITHUB_STEP_SUMMARY"

  schema-drift:
    name: Schema Drift Detection
    needs: [migrate]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref "$STAGING_REF"
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}

      - name: Check for schema drift
        run: |
          OUTPUT=$(supabase db diff --linked 2>&1) || true
          if [ -n "$OUTPUT" ] && [ "$OUTPUT" != "No changes found" ]; then
            echo "::warning::Schema drift detected against staging project"
            echo "### Schema Drift Detected" >> "$GITHUB_STEP_SUMMARY"
            echo '```sql' >> "$GITHUB_STEP_SUMMARY"
            echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Schema Drift — None" >> "$GITHUB_STEP_SUMMARY"
          fi
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

  deploy-functions:
    name: Deploy Edge Functions
    needs: [migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref "$STAGING_REF"
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}

      - name: Deploy all edge functions
        run: supabase functions deploy
        working-directory: packages/db
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Summary
        if: always()
        run: echo "### Edge Functions ${{ job.status == 'success' && '✅' || '❌' }}" >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Summary
    needs: [migrate, schema-drift, deploy-functions]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deploy dev summary
        run: |
          echo "## Deploy Dev Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Migrations | ${{ needs.migrate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Schema Drift | ${{ needs.schema-drift.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Edge Functions | ${{ needs.deploy-functions.result }} |" >> "$GITHUB_STEP_SUMMARY"
